# electron-builder 配置
# 文档: https://www.electron.build/configuration/configuration

appId: com.proma.app
productName: Proma
copyright: Copyright © 2024-2025 Proma

# Electron 版本（CI 环境 bun workspace 下无法自动检测，需显式指定）
electronVersion: 39.5.1

# 目录配置
directories:
  output: out
  buildResources: resources

# 压缩配置
compression: normal

# ASAR 打包配置（禁用 ASAR，避免 SDK symlink 路径越界问题）
asar: false

# 跳过 npm install（代码已被 esbuild/Vite 打包，npm 不识别 workspace:* 协议）
npmRebuild: false

# 通用文件配置
files:
  - dist/**/*
  - package.json
  # 包含 SDK 到 app.asar/app 目录中（与 dist 和 package.json 同级）
  - node_modules/@anthropic-ai/claude-agent-sdk/**/*
  # 排除 workspace 包的 symlink（代码已被 esbuild/Vite 打包到 dist/ 中）
  - "!node_modules/@proma/**"

# 通用额外资源
extraResources:
  # 默认 Skills 模板（首次启动时同步到 ~/.proma/default-skills/）
  - from: default-skills
    to: default-skills
    filter:
      - "**/*"

# ============================================
# macOS 配置
# ============================================
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  # macOS 额外资源
  extraResources:
    # Bun 二进制（download-bun.ts 使用 darwin-${arch} 命名）
    - from: "vendor/bun/darwin-${arch}"
      to: "vendor/bun"
      filter:
        - "**/*"
    # 根据架构选择正确的 ripgrep（实际位于根目录 node_modules 中）
    - from: "../../node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/${arch}-darwin"
      to: "vendor/ripgrep"
      filter:
        - "**/*"

# DMG 配置
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# ============================================
# Windows 配置
# ============================================
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Windows 额外资源
  extraResources:
    # Bun 二进制
    - from: "vendor/bun/win32-${arch}"
      to: "vendor/bun"
      filter:
        - "**/*"
    - from: "../../packages/core/node_modules/@anthropic-ai/claude-agent-sdk/vendor/ripgrep/x64-win32"
      to: "vendor/ripgrep"
      filter:
        - "**/*"

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# ============================================
# 发布配置
# ============================================
publish:
  provider: github
  owner: ErlichLiu
  repo: Proma
